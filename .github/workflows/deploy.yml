name: Build and Deploy to EC2

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

env:
  IMAGE_NAME: pca-agent
  FRONTEND_IMAGE_NAME: pca-frontend
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build Backend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix={{branch}}-
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.production
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:buildcache,mode=max

      - name: Image digest
        run: echo ${{ steps.meta.outputs.digest }}

  build-frontend:
    name: Build Frontend Docker Image
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          build-args: |
            NEXT_PUBLIC_API_URL=http://${{ secrets.EC2_HOST }}:8000
            NEXT_PUBLIC_APP_NAME=PCA Agent
          cache-from: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE_NAME }}:buildcache,mode=max

  deploy:
    name: Deploy to EC2
    needs: [build-and-push, build-frontend]
    runs-on: self-hosted

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Pull and deploy
        env:
          GHCR_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.IMAGE_NAME }}:latest
          GHCR_FRONTEND_IMAGE: ghcr.io/${{ github.repository_owner }}/${{ env.FRONTEND_IMAGE_NAME }}:latest
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
          ENCRYPTION_KEY: ${{ secrets.ENCRYPTION_KEY }}
          JWT_SECRET_KEY: ${{ secrets.JWT_SECRET_KEY }}
        run: |
          set -e

          echo "$GITHUB_TOKEN" | docker login ghcr.io -u $GITHUB_ACTOR --password-stdin

          echo "Pulling latest backend image..."
          docker pull $GHCR_IMAGE
          docker tag $GHCR_IMAGE pca-agent:latest

          echo "Pulling latest frontend image..."
          docker pull $GHCR_FRONTEND_IMAGE
          docker tag $GHCR_FRONTEND_IMAGE pca-frontend:latest

          # Sync latest compose file from repo
          cp $GITHUB_WORKSPACE/docker-compose.full.yml /home/ubuntu/pca_o/docker/docker-compose.full.yml

          cd /home/ubuntu/pca_o/docker
          docker compose -f docker-compose.full.yml up -d --no-build

          echo "Waiting for API to be healthy..."
          sleep 20

          if docker ps | grep -q "pca-api"; then
            echo "✅ Deployment successful!"
            docker logs pca-api --tail 20
          else
            echo "❌ Deployment failed!"
            docker logs pca-api --tail 50
            exit 1
          fi

      - name: Verify deployment
        run: |
          sleep 5
          curl -f http://localhost:8000/health || exit 1
          echo "✅ Health check passed!"
