name: Deploy to EC2

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:

          host: 65.0.30.213
          username: ubuntu
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            cd ~/pca_o
            git pull origin main
            cd docker
            docker compose down
            docker compose up -d --build
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      
      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=
            type=ref,event=branch
            type=semver,pattern={{version}}
      
      - name: Build API image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-api:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
      
      - name: Build Frontend image
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}-frontend:${{ steps.meta.outputs.version }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # Deploy to Staging
  # ============================================
  deploy-staging:
    name: Deploy Staging
    runs-on: ubuntu-latest
    needs: build
    if: github.ref == 'refs/heads/v1' || github.event.inputs.environment == 'staging'
    environment:
      name: staging
      url: https://staging.media-analytics.in
    
    steps:
      - uses: actions/checkout@v4

      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to Staging
        run: |
          echo "Deploying version $DEPLOY_VERSION to staging"
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.STAGING_HOST }} << 'DEPLOY_SCRIPT'
            cd /home/ubuntu/pca_agent
            
            # Export variables for docker-compose
            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_NAME=${{ env.IMAGE_NAME }}
            export VERSION=${{ env.DEPLOY_VERSION }}

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull latest images
            docker-compose -f docker/docker-compose.deploy.yml pull

            # Update services
            docker-compose -f docker/docker-compose.deploy.yml up -d --remove-orphans

            # Verify containers are running
            docker-compose -f docker/docker-compose.deploy.yml ps
          DEPLOY_SCRIPT
        env:
          DEPLOY_VERSION: ${{ needs.build.outputs.version }}

      - name: Health Check
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 10 https://staging.media-analytics.in/health || exit 1

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ============================================
  # Deploy to Production
  # ============================================
  deploy-production:
    name: Deploy Production
    runs-on: ubuntu-latest
    needs: [build, deploy-staging]
    if: startsWith(github.ref, 'refs/tags/v') || github.event.inputs.environment == 'production'
    environment:
      name: production
      url: https://media-analytics.in
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts
      
      - name: Store current version for rollback
        run: |
          export PREVIOUS_VERSION=$(curl -s https://media-analytics.in/health | jq -r '.version // "latest"')
          echo "PREVIOUS_VERSION=$PREVIOUS_VERSION" >> $GITHUB_ENV
      
      - name: Deploy to Production
        run: |
          echo "Deploying version ${{ needs.build.outputs.version }} to production"
          ssh -i ~/.ssh/deploy_key ubuntu@${{ secrets.PROD_HOST }} << 'DEPLOY_SCRIPT'
            cd /home/ubuntu/pca_agent
            
            # Export variables for docker-compose
            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_NAME=${{ env.IMAGE_NAME }}
            export VERSION=${{ env.DEPLOY_VERSION }}

            # Login to GHCR
            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

            # Pull images
            docker-compose -f docker/docker-compose.deploy.yml pull

            # Blue-Green or simple rolling update
            docker-compose -f docker/docker-compose.deploy.yml up -d --remove-orphans

            # Verify
            docker-compose -f docker/docker-compose.deploy.yml ps
          DEPLOY_SCRIPT
        env:
          DEPLOY_VERSION: ${{ needs.build.outputs.version }}
      
      - name: Health Check
        id: health
        run: |
          sleep 30
          curl --fail --retry 5 --retry-delay 10 https://media-analytics.in/health || exit 1
      
      - name: Create Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key

  # ============================================
  # Rollback
  # ============================================
  rollback:
    name: Rollback
    runs-on: ubuntu-latest
    if: github.event.inputs.rollback_version != ''
    environment:
      name: ${{ github.event.inputs.environment }}
    
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup SSH key
        run: |
          mkdir -p ~/.ssh
          if [ "${{ github.event.inputs.environment }}" == "production" ]; then
            echo "${{ secrets.PROD_SSH_KEY }}" > ~/.ssh/deploy_key
            ssh-keyscan -H ${{ secrets.PROD_HOST }} >> ~/.ssh/known_hosts
          else
            echo "${{ secrets.STAGING_SSH_KEY }}" > ~/.ssh/deploy_key
            ssh-keyscan -H ${{ secrets.STAGING_HOST }} >> ~/.ssh/known_hosts
          fi
          chmod 600 ~/.ssh/deploy_key

      - name: Rollback to version
        run: |
          echo "Rolling back to version ${{ github.event.inputs.rollback_version }}"
          TARGET_HOST=${{ github.event.inputs.environment == 'production' && secrets.PROD_HOST || secrets.STAGING_HOST }}
          ssh -i ~/.ssh/deploy_key ubuntu@$TARGET_HOST << 'ROLLBACK_SCRIPT'
            cd /home/ubuntu/pca_agent
            export REGISTRY=${{ env.REGISTRY }}
            export IMAGE_NAME=${{ env.IMAGE_NAME }}
            export VERSION=${{ env.ROLLBACK_VERSION }}

            echo "${{ secrets.GITHUB_TOKEN }}" | docker login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin
            
            docker-compose -f docker/docker-compose.deploy.yml pull
            docker-compose -f docker/docker-compose.deploy.yml up -d
          ROLLBACK_SCRIPT
        env:
          ROLLBACK_VERSION: ${{ github.event.inputs.rollback_version }}
      
      - name: Verify Rollback
        run: |
          sleep 30
          URL=${{ github.event.inputs.environment == 'production' && 'https://media-analytics.in' || 'https://staging.media-analytics.in' }}
          DEPLOYED_VERSION=$(curl -s $URL/health | jq -r '.version')
          if [ "$DEPLOYED_VERSION" != "${{ github.event.inputs.rollback_version }}" ]; then
            echo "Rollback verification failed. Expected ${{ github.event.inputs.rollback_version }}, got $DEPLOYED_VERSION"
            exit 1
          fi
          echo "Rollback successful"

      - name: Cleanup SSH key
        if: always()
        run: rm -f ~/.ssh/deploy_key
        (Trigger redeploy)
