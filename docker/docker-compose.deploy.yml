version: '3.8'

services:
  # Nginx Reverse Proxy
  nginx:
    image: nginx:alpine
    container_name: pca-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf
    depends_on:
      - frontend
      - api
    restart: always
    networks:
      - default

  # Frontend (Next.js)
  frontend:
    build:
      context: ../frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_API_URL: /api/v1
    container_name: pca-frontend
    environment:
      - PORT=3000
      - HOSTNAME=0.0.0.0
    restart: always
    networks:
      - default

  # Redis
  redis:
    image: redis:7-alpine
    container_name: pca-redis
    volumes:
      - redis-data:/data
    restart: unless-stopped
    networks:
      - default

  # Main API
  api:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pca-api
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
      - JAEGER_AGENT_HOST=jaeger
      - JAEGER_AGENT_PORT=6831
      - ENVIRONMENT=production
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
      # No code mount - use built image
    depends_on:
      - redis
      - jaeger
    command: uvicorn src.api.main:app --host 0.0.0.0 --port 8000
    restart: unless-stopped
    networks:
      - default

  # Celery Worker
  celery-worker:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pca-celery-worker
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    volumes:
      - ../data:/app/data
      - ../reports:/app/reports
    depends_on:
      - redis
    command: celery -A src.tasks.celery_app worker --loglevel=info --concurrency=2
    restart: unless-stopped
    networks:
      - default

  # Celery Beat
  celery-beat:
    build:
      context: ..
      dockerfile: docker/Dockerfile
    container_name: pca-celery-beat
    environment:
      - CELERY_BROKER_URL=redis://redis:6379/0
      - CELERY_RESULT_BACKEND=redis://redis:6379/0
    depends_on:
      - redis
    command: celery -A src.tasks.celery_app beat --loglevel=info
    restart: unless-stopped
    networks:
      - default

  # Observability
  jaeger:
    image: jaegertracing/all-in-one:latest
    container_name: pca-jaeger
    restart: always
    environment:
      - COLLECTOR_ZIPKIN_HOST_PORT=:9411
    networks:
      - default

  prometheus:
    image: prom/prometheus:latest
    container_name: pca-prometheus
    restart: always
    volumes:
      - ./monitoring/prometheus:/etc/prometheus
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    networks:
      - default

volumes:
  redis-data:
    driver: local

networks:
  default:
    name: pca-network
