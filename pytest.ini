[pytest]
# Broadened but curated testpaths to include most functional domains
testpaths = 
    tests/unit/platform
    tests/unit/core
    tests/unit/engine
    tests/unit/interface
    tests/unit/analytics
    tests/unit/api
    tests/unit/services
    tests/unit/test_temporal_parser.py

python_files = test_*.py
python_classes = Test*
python_functions = test_*

# Global ignores for legacy, segfault-inducing, or architecture-mismatched tests
addopts = 
    --ignore-glob="*coverage.py"
    --ignore=tests/unit/analytics/test_campaign_features.py
    --ignore=tests/unit/interface/mcp/test_mcp_coverage.py
    --ignore=tests/unit/test_langgraph_flow.py
    --ignore=tests/unit/test_rag_retrieval.py
    --ignore=tests/unit/test_api_auth.py
    --ignore=tests/unit/test_api_endpoints_comprehensive.py
    --ignore=tests/unit/agents/test_pattern_detection.py
    --ignore=tests/unit/database/test_database_comprehensive.py
    --ignore=tests/unit/test_auto_insights.py
    --ignore=tests/unit/test_auto_insights_comprehensive.py
    -v
    --strict-markers

markers =
    slow: marks tests as slow (deselect with '-m "not slow"')
    integration: marks integration tests
